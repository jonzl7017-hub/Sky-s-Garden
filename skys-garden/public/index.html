<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f3e5f5" />
  <title>Sky's Garden 🌸</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #ec407a; --pink-light: #f8bbd0; --pink-dark: #c2185b;
      --purple: #ab47bc; --purple-dark: #7b1fa2; --purple-light: #e1bee7;
      --blue: #5c6bc0; --blue-light: #c5cae9; --blue-dark: #3949ab;
      --text: #4a148c; --text-light: #7c43bd; --text-muted: #ba68c8;
      --bg1: #fce4ec; --bg2: #f3e5f5; --bg3: #e8eaf6;
      --card-bg: rgba(255,255,255,0.88); --card-border: #e1bee7;
      --nav-bg: rgba(255,255,255,0.92);
      --gradient: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
    }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh; min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .garden-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .garden-bg-gradient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, #f8bbd080 0%, transparent 50%),
        radial-gradient(ellipse at 80% 10%, #c5cae960 0%, transparent 45%),
        radial-gradient(ellipse at 50% 60%, #e1bee740 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, #f8bbd050 0%, transparent 45%),
        radial-gradient(ellipse at 10% 90%, #c5cae950 0%, transparent 40%),
        linear-gradient(170deg, var(--bg1) 0%, var(--bg2) 40%, var(--bg3) 100%);
    }
    .floating-flower { position: absolute; animation: floatA 7s ease-in-out infinite; }
    .floating-flower:nth-child(3n) { animation-name: floatB; }
    .floating-flower:nth-child(3n+1) { animation-name: floatC; }
    .bottom-flower { position: absolute; bottom: -5px; animation: sway 4s ease-in-out infinite alternate; }
    @keyframes floatA { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-18px) rotate(8deg)} }
    @keyframes floatB { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-12px) rotate(-6deg) scale(1.08)} }
    @keyframes floatC { 0%,100%{transform:translate(0,0)} 33%{transform:translate(6px,-10px) rotate(5deg)} 66%{transform:translate(-4px,-16px) rotate(-4deg)} }
    @keyframes sway { 0%{transform:translateY(0) rotate(-6deg)} 100%{transform:translateY(-12px) rotate(6deg)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes bounce { 0%{transform:scale(.5)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
    @keyframes popIn { 0%{opacity:0;transform:scale(.8)} 100%{opacity:1;transform:scale(1)} }

    .header {
      background: var(--nav-bg); backdrop-filter: blur(14px);
      border-bottom: 3px solid var(--purple-light);
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { font-size: 28px; }
    .header-title {
      font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 18px;
      background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1;
    }
    .header-subtitle { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .xp-text { font-size: 12px; font-weight: 700; color: var(--purple); text-align: right; }
    .xp-bar { width: 60px; height: 6px; background: var(--purple-light); border-radius: 3px; overflow: hidden; }
    .xp-fill { height: 100%; background: var(--gradient); border-radius: 3px; transition: width .5s ease; }
    .profile-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--purple-light);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      cursor: pointer; transition: all .2s; background: var(--bg2);
    }
    .profile-btn.active { background: linear-gradient(135deg, var(--pink), var(--purple)); }

    .screen { position: relative; z-index: 1; padding-bottom: 80px; min-height: calc(100vh - 56px); }
    .screen-content { animation: popIn .3s ease-out; }

    .camera-wrap { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 16px; min-height: 60vh; }
    .camera-title { font-family: 'Fredoka', sans-serif; font-size: 20px; font-weight: 600; color: var(--text); text-align: center; }
    .camera-subtitle { font-size: 14px; color: var(--text-light); text-align: center; }
    .camera-viewport {
      width: 100%; max-width: 400px; aspect-ratio: 4/3; border-radius: 20px; overflow: hidden;
      border: 4px solid var(--purple-light); background: var(--purple-dark); position: relative;
      box-shadow: 0 8px 32px rgba(171,71,188,.4);
    }
    .camera-viewport video { width: 100%; height: 100%; object-fit: cover; }
    .camera-error {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: white; padding: 20px; text-align: center; gap: 12px;
    }
    .viewfinder-corner { position: absolute; width: 24px; height: 24px; border-color: rgba(255,255,255,.7); border-style: solid; border-width: 0; }
    .vf-tl { top:12px; left:12px; border-top-width:3px; border-left-width:3px; border-radius:6px 0 0 0; }
    .vf-tr { top:12px; right:12px; border-top-width:3px; border-right-width:3px; border-radius:0 6px 0 0; }
    .vf-bl { bottom:12px; left:12px; border-bottom-width:3px; border-left-width:3px; border-radius:0 0 0 6px; }
    .vf-br { bottom:12px; right:12px; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 6px 0; }
    .flip-btn {
      position: absolute; top: 12px; right: 12px; width: 36px; height: 36px;
      border-radius: 50%; border: none; background: rgba(0,0,0,.4); color: white;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5;
    }
    .shutter-btn {
      width: 72px; height: 72px; border-radius: 50%; border: 4px solid var(--purple);
      background: var(--gradient); cursor: pointer;
      box-shadow: 0 4px 20px rgba(171,71,188,.5);
      display: flex; align-items: center; justify-content: center; font-size: 28px; transition: all .2s;
    }
    .shutter-btn:disabled { background: var(--purple-light); cursor: not-allowed; }
    .shutter-spinner {
      width: 28px; height: 28px; border: 3px solid rgba(255,255,255,.3);
      border-top-color: white; border-radius: 50%; animation: spin .8s linear infinite;
    }
    .identifying-text { font-size: 14px; color: var(--purple); font-weight: 600; animation: pulse 1.5s ease-in-out infinite; }

    .result-wrap { padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; animation: slideUp .4s ease-out; }
    .plant-card {
      background: var(--card-bg); border-radius: 20px; padding: 20px; width: 100%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(171,71,188,.15); border: 2px solid var(--card-border);
    }
    .plant-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 14px; margin-bottom: 16px; }
    .plant-name { font-family: 'Fredoka', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .plant-sci { font-size: 13px; color: var(--text-muted); font-style: italic; margin-bottom: 12px; }
    .plant-desc { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 16px; }
    .fun-facts { background: linear-gradient(135deg, var(--bg1), var(--bg2)); border-radius: 12px; padding: 14px; border: 1px solid var(--pink-light); }
    .fun-facts-title { font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 600; color: var(--purple); margin-bottom: 8px; }
    .fun-fact { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 6px; padding-left: 20px; position: relative; }
    .fun-fact .icon { position: absolute; left: 0; }
    .id-tip {
      background: linear-gradient(135deg, var(--blue-light), var(--purple-light));
      border-radius: 10px; padding: 10px 14px; margin-top: 12px;
      font-size: 13px; color: var(--text); line-height: 1.4;
    }
    .id-tip-label { font-family: 'Fredoka', sans-serif; font-weight: 600; color: var(--blue-dark); font-size: 12px; margin-bottom: 4px; }
    .confidence-badge {
      display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px;
      font-weight: 700; margin-left: 8px; vertical-align: middle;
    }
    .confidence-high { background: #c8e6c9; color: #2e7d32; }
    .confidence-medium { background: #fff9c4; color: #f57f17; }
    .confidence-low { background: #ffcdd2; color: #c62828; }

    .primary-btn {
      padding: 14px 40px; border-radius: 30px; border: none; background: var(--gradient);
      color: white; font-family: 'Fredoka', sans-serif; font-size: 16px; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 16px rgba(171,71,188,.4); transition: transform .15s;
    }
    .primary-btn:active { transform: scale(.96); }

    /* Option picker */
    .options-title { font-family: 'Fredoka', sans-serif; font-size: 18px; font-weight: 600; color: var(--text); text-align: center; }
    .options-subtitle { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 4px; }
    .option-card {
      background: var(--card-bg); border-radius: 16px; padding: 16px; width: 100%; max-width: 380px;
      border: 2px solid var(--card-border); cursor: pointer; transition: all .2s;
    }
    .option-card:active { transform: scale(.97); }
    .option-card.selected { border-color: var(--purple); box-shadow: 0 4px 20px rgba(171,71,188,.3); }
    .option-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .option-name { font-family: 'Fredoka', sans-serif; font-size: 16px; font-weight: 600; color: var(--text); }
    .option-sci { font-size: 12px; color: var(--text-muted); font-style: italic; }
    .option-desc { font-size: 13px; color: var(--text); line-height: 1.5; margin-top: 8px; }
    .option-tip { font-size: 12px; color: var(--blue-dark); margin-top: 8px; background: var(--blue-light); padding: 8px 10px; border-radius: 8px; }
    .option-number {
      width: 28px; height: 28px; border-radius: 50%; background: var(--gradient);
      color: white; font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* Collection */
    .collection-wrap { padding: 16px; }
    .collection-title { font-family: 'Fredoka', sans-serif; font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .collection-count { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
    .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .collection-item {
      background: var(--card-bg); border-radius: 16px; overflow: hidden;
      border: 2px solid var(--card-border); cursor: pointer; transition: transform .2s, box-shadow .2s;
      position: relative;
    }
    .collection-item:active { transform: scale(.97); }
    .collection-item img { width: 100%; height: 110px; object-fit: cover; }
    .collection-placeholder {
      width: 100%; height: 110px; background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex; align-items: center; justify-content: center; font-size: 36px;
    }
    .collection-item-info { padding: 10px; }
    .collection-item-name { font-family: 'Fredoka', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .collection-item-date { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .delete-btn {
      position: absolute; top: 6px; right: 6px; width: 28px; height: 28px;
      border-radius: 50%; border: none; background: rgba(239,83,80,.9); color: white;
      font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,.2); transition: transform .15s;
    }
    .delete-btn:active { transform: scale(.85); }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; gap: 12px; }
    .empty-icon { font-size: 60px; }
    .empty-title { font-family: 'Fredoka', sans-serif; font-size: 20px; font-weight: 600; color: var(--text); }
    .empty-sub { font-size: 14px; color: var(--text-light); }
    .back-btn { background: none; border: none; font-weight: 700; font-size: 14px; color: var(--purple); cursor: pointer; margin-bottom: 12px; font-family: 'Nunito', sans-serif; }

    /* Delete confirmation modal */
    .delete-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .delete-modal {
      background: white; border-radius: 20px; padding: 24px; max-width: 320px; width: 100%;
      text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,.2);
    }
    .delete-modal-title { font-family: 'Fredoka', sans-serif; font-size: 18px; font-weight: 600; color: #c62828; margin-bottom: 8px; }
    .delete-modal-text { font-size: 14px; color: #616161; margin-bottom: 16px; line-height: 1.4; }
    .delete-modal-actions { display: flex; gap: 10px; justify-content: center; }

    /* Profile */
    .profile-wrap { padding: 16px; max-width: 400px; margin: 0 auto; }
    .profile-card {
      background: var(--card-bg); border-radius: 20px; padding: 24px; text-align: center;
      margin-bottom: 16px; border: 2px solid var(--card-border); box-shadow: 0 8px 32px rgba(171,71,188,.12);
    }
    .profile-icon { font-size: 48px; margin-bottom: 8px; }
    .profile-title {
      font-family: 'Fredoka', sans-serif; font-size: 24px; font-weight: 700;
      background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .profile-level { font-size: 14px; color: var(--text-muted); font-weight: 600; margin-bottom: 16px; }
    .profile-stats { display: flex; justify-content: center; gap: 32px; }
    .stat-num { font-family: 'Fredoka', sans-serif; font-size: 28px; font-weight: 700; color: var(--purple); }
    .stat-label { font-size: 12px; color: var(--text-muted); }
    .progress-section { margin-top: 16px; }
    .progress-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .progress-bar { width: 100%; height: 10px; background: var(--bg2); border-radius: 5px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--gradient); border-radius: 5px; transition: width .5s ease; }
    .badges-card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 2px solid var(--card-border); margin-bottom: 16px; }
    .badges-title { font-family: 'Fredoka', sans-serif; font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
    .badges-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .badge-item { border-radius: 12px; padding: 12px 8px; text-align: center; }
    .badge-item.earned { background: linear-gradient(135deg, var(--bg1), var(--bg2)); border: 2px solid var(--card-border); }
    .badge-item.locked { background: #fafafa; border: 2px dashed #e0e0e0; opacity: .4; }
    .badge-emoji { font-size: 24px; }
    .badge-name { font-size: 10px; font-weight: 700; margin-top: 4px; }
    .badge-count { font-size: 9px; }
    .reset-btn { background: none; border: none; font-size: 13px; color: #ef5350; cursor: pointer; text-decoration: underline; font-family: 'Nunito', sans-serif; }
    .reset-confirm { background: #ffebee; border-radius: 12px; padding: 14px; border: 2px solid #ef9a9a; }
    .reset-text { font-size: 13px; color: #c62828; margin-bottom: 10px; }
    .reset-actions { display: flex; gap: 8px; justify-content: center; }
    .btn-danger { padding: 8px 20px; border-radius: 16px; border: none; background: #ef5350; color: white; font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'Nunito', sans-serif; }
    .btn-cancel { padding: 8px 20px; border-radius: 16px; border: 2px solid #e0e0e0; background: white; color: #616161; font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'Nunito', sans-serif; }
    .btn-small { padding: 8px 20px; border-radius: 20px; border: none; background: var(--pink); color: white; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--nav-bg); backdrop-filter: blur(14px);
      border-top: 2px solid var(--purple-light);
      display: flex; justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 100;
    }
    .nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 16px; transition: all .2s; }
    .nav-icon { font-size: 22px; transition: all .2s; }
    .nav-icon.inactive { filter: grayscale(60%); }
    .nav-icon.active { transform: scale(1.15); }
    .nav-label { font-size: 11px; }
    .nav-label.active { font-weight: 800; color: var(--purple); }
    .nav-label.inactive { font-weight: 600; color: #9e9e9e; }

    .hidden { display: none !important; }
    .text-center { text-align: center; }
  </style>
</head>
<body>

<div class="garden-bg">
  <div class="garden-bg-gradient"></div>
  <div id="floatingFlowers"></div>
  <div id="bottomFlowers"></div>
</div>

<div class="header">
  <div class="header-left">
    <span class="header-logo">🌸</span>
    <div>
      <div class="header-title">Sky's Garden</div>
      <div class="header-subtitle" id="headerSubtitle">Sprout • Lv.1</div>
    </div>
  </div>
  <div class="header-right">
    <div style="text-align:right">
      <div class="xp-text" id="headerXP">0 XP</div>
      <div class="xp-bar"><div class="xp-fill" id="headerXPBar" style="width:0%"></div></div>
    </div>
    <button class="profile-btn" id="profileToggle" onclick="toggleProfile()">👤</button>
  </div>
</div>

<div class="screen" id="screenCamera">
  <div class="camera-wrap screen-content">
    <div class="camera-title">📸 Find a Plant!</div>
    <div class="camera-subtitle">Point your camera at any plant or flower and tap the button!</div>
    <div class="camera-viewport">
      <video id="cameraVideo" autoplay playsinline muted></video>
      <div class="camera-error hidden" id="cameraError">
        <span style="font-size:40px">📷</span>
        <span id="cameraErrorText">Camera access needed!</span>
        <button class="btn-small" onclick="startCamera()">Try Again</button>
      </div>
      <div id="viewfinder" class="hidden">
        <div class="viewfinder-corner vf-tl"></div>
        <div class="viewfinder-corner vf-tr"></div>
        <div class="viewfinder-corner vf-bl"></div>
        <div class="viewfinder-corner vf-br"></div>
      </div>
      <button class="flip-btn hidden" id="flipBtn" onclick="switchCamera()">🔄</button>
    </div>
    <canvas id="cameraCanvas" style="display:none"></canvas>
    <button class="shutter-btn" id="shutterBtn" onclick="takePhoto()" disabled>🌸</button>
    <div class="identifying-text hidden" id="identifyingText">🔍 Discovering your plant...</div>
  </div>
</div>

<div class="screen hidden" id="screenResult">
  <div class="result-wrap screen-content" id="resultContent"></div>
</div>

<div class="screen hidden" id="screenCollection">
  <div class="collection-wrap screen-content" id="collectionContent"></div>
</div>

<div class="screen hidden" id="screenProfile">
  <div class="profile-wrap screen-content" id="profileContent"></div>
</div>

<!-- Delete confirmation modal -->
<div class="delete-modal-overlay hidden" id="deleteModal">
  <div class="delete-modal">
    <div style="font-size:36px;margin-bottom:8px">🗑️</div>
    <div class="delete-modal-title">Remove this plant?</div>
    <div class="delete-modal-text" id="deleteModalText">Remove "Plant Name" from your collection?</div>
    <div class="delete-modal-actions">
      <button class="btn-danger" id="deleteConfirmBtn">Remove</button>
      <button class="btn-cancel" onclick="closeDeleteModal()">Keep it</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" onclick="showScreen('camera')">
    <span class="nav-icon active" id="navIconCamera">📸</span>
    <span class="nav-label active" id="navLabelCamera">Discover</span>
  </button>
  <button class="nav-btn" onclick="showScreen('collection')">
    <span class="nav-icon inactive" id="navIconCollection">🌺</span>
    <span class="nav-label inactive" id="navLabelCollection">My Plants</span>
  </button>
  <button class="nav-btn" onclick="showScreen('profile')">
    <span class="nav-icon inactive" id="navIconProfile">🏅</span>
    <span class="nav-label inactive" id="navLabelProfile">Profile</span>
  </button>
</div>

<script>
// ══════════════════════════════════════════
//  Sky's Garden — App Logic v3
//  Storage: localStorage for plant data (always saves)
//           IndexedDB for photos (much larger capacity)
// ══════════════════════════════════════════

let collection = [];
let xp = 0;
let currentScreen = "camera";
let streaming = false;
let facingMode = "environment";
let isIdentifying = false;
let pendingDeleteIndex = -1;
let lastPhotoDataUrl = null;
let photoDB = null; // IndexedDB reference

const XP_PER_PLANT = 25;
const BADGES = [
  { name: "Seedling Scout", count: 1, emoji: "🌱" },
  { name: "Petal Picker", count: 5, emoji: "🌸" },
  { name: "Garden Explorer", count: 10, emoji: "🌻" },
  { name: "Leaf Legend", count: 20, emoji: "🍃" },
  { name: "Bloom Master", count: 30, emoji: "💐" },
  { name: "Nature Wizard", count: 50, emoji: "🧙" },
];

function getLevel(xp) {
  if (xp < 100) return { level: 1, title: "Sprout", prev: 0, next: 100 };
  if (xp < 250) return { level: 2, title: "Budding Botanist", prev: 100, next: 250 };
  if (xp < 500) return { level: 3, title: "Garden Ranger", prev: 250, next: 500 };
  if (xp < 1000) return { level: 4, title: "Plant Pro", prev: 500, next: 1000 };
  if (xp < 2000) return { level: 5, title: "Forest Sage", prev: 1000, next: 2000 };
  return { level: 6, title: "Nature Champion", prev: 2000, next: null };
}

// ══════════════════════════════════════
//  IndexedDB — Photo Storage (persistent, large capacity)
// ══════════════════════════════════════
function openPhotoDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open("SkysGardenPhotos", 1);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("photos")) {
        db.createObjectStore("photos", { keyPath: "id" });
      }
    };
    request.onsuccess = (e) => { photoDB = e.target.result; resolve(photoDB); };
    request.onerror = () => { console.warn("IndexedDB not available"); resolve(null); };
  });
}

async function savePhoto(plantId, imageDataUrl) {
  if (!photoDB) return false;
  return new Promise((resolve) => {
    try {
      const tx = photoDB.transaction("photos", "readwrite");
      tx.objectStore("photos").put({ id: plantId, image: imageDataUrl });
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => { console.warn("Photo save failed"); resolve(false); };
    } catch { resolve(false); }
  });
}

async function getPhoto(plantId) {
  if (!photoDB) return null;
  return new Promise((resolve) => {
    try {
      const tx = photoDB.transaction("photos", "readonly");
      const req = tx.objectStore("photos").get(plantId);
      req.onsuccess = () => resolve(req.result ? req.result.image : null);
      req.onerror = () => resolve(null);
    } catch { resolve(null); }
  });
}

async function deletePhoto(plantId) {
  if (!photoDB) return;
  return new Promise((resolve) => {
    try {
      const tx = photoDB.transaction("photos", "readwrite");
      tx.objectStore("photos").delete(plantId);
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    } catch { resolve(); }
  });
}

async function clearAllPhotos() {
  if (!photoDB) return;
  return new Promise((resolve) => {
    try {
      const tx = photoDB.transaction("photos", "readwrite");
      tx.objectStore("photos").clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    } catch { resolve(); }
  });
}

// Generate a unique ID for each plant based on name + date
function plantId(plant) {
  return (plant.name + "_" + plant.date).toLowerCase().replace(/[^a-z0-9]/g, "_");
}

// ══════════════════════════════════════
//  localStorage — Plant data (names, facts, XP — always saves)
// ══════════════════════════════════════
function saveData() {
  try {
    // Save collection WITHOUT image data (just text info)
    const lightCollection = collection.map(p => {
      const copy = { ...p };
      delete copy.image; // Don't save base64 images in localStorage
      return copy;
    });
    localStorage.setItem("skys-garden", JSON.stringify({ collection: lightCollection, xp }));
  } catch (e) {
    console.warn("localStorage save failed:", e);
  }
}

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem("skys-garden"));
    if (d) { collection = d.collection || []; xp = d.xp || 0; }
  } catch {}
}

// Load photos from IndexedDB into collection items for display
async function loadPhotosIntoCollection() {
  for (let i = 0; i < collection.length; i++) {
    const photo = await getPhoto(plantId(collection[i]));
    if (photo) collection[i].image = photo;
  }
}

// ══════════════════════════════════════
//  Background
// ══════════════════════════════════════
function initBackground() {
  const flowers = ["🌸","🌺","🌷","🌹","🌻","💐","🌼","🪻","🌿","🍀","🪷","🌾","💮","🏵️","🌱"];
  const cont = document.getElementById("floatingFlowers");
  for (let i = 0; i < 20; i++) {
    const el = document.createElement("div"); el.className = "floating-flower";
    el.textContent = flowers[i % flowers.length];
    el.style.left = `${(i*5.3+Math.sin(i)*8)%100}%`; el.style.top = `${(i*7.1+Math.cos(i)*12)%100}%`;
    el.style.fontSize = `${16+(i%5)*5}px`; el.style.opacity = 0.08+(i%4)*0.04;
    el.style.animationDuration = `${6+(i%5)*2}s`; el.style.animationDelay = `${(i*0.7)%5}s`;
    cont.appendChild(el);
  }
  const btm = document.getElementById("bottomFlowers");
  const bf = ["🌸","🌷","🌺","🌿","🪻","🌹","🌼"];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement("div"); el.className = "bottom-flower";
    el.textContent = bf[i%7]; el.style.left = `${i*7.5+(i%2)*2}%`; el.style.bottom = `${-5+(i%3)*8}px`;
    el.style.fontSize = `${22+(i%4)*6}px`; el.style.opacity = 0.13+(i%3)*0.05;
    el.style.animationDuration = `${3+(i%4)}s`; el.style.animationDelay = `${i*0.4}s`;
    btm.appendChild(el);
  }
}

function updateHeader() {
  const info = getLevel(xp);
  document.getElementById("headerSubtitle").textContent = `${info.title} • Lv.${info.level}`;
  document.getElementById("headerXP").textContent = `${xp} XP`;
  const pct = info.next ? ((xp - info.prev) / (info.next - info.prev)) * 100 : 100;
  document.getElementById("headerXPBar").style.width = `${pct}%`;
}

function showScreen(name) {
  currentScreen = name;
  ["camera","result","collection","profile"].forEach(s => {
    document.getElementById(`screen${s.charAt(0).toUpperCase()+s.slice(1)}`).classList.toggle("hidden", s !== name);
  });
  ["camera","collection","profile"].forEach(s => {
    const active = (name === "result" ? "camera" : name) === s;
    document.getElementById(`navIcon${s.charAt(0).toUpperCase()+s.slice(1)}`).className = `nav-icon ${active?"active":"inactive"}`;
    document.getElementById(`navLabel${s.charAt(0).toUpperCase()+s.slice(1)}`).className = `nav-label ${active?"active":"inactive"}`;
  });
  document.getElementById("profileToggle").className = `profile-btn ${name==="profile"?"active":""}`;
  document.getElementById("profileToggle").textContent = name === "profile" ? "✕" : "👤";
  if (name === "collection") renderCollection();
  if (name === "profile") renderProfile();
}

function toggleProfile() { showScreen(currentScreen === "profile" ? "camera" : "profile"); }

// ── Camera ──
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode, width: { ideal: 1280 }, height: { ideal: 960 } } });
    const video = document.getElementById("cameraVideo");
    video.srcObject = stream; streaming = true;
    document.getElementById("cameraError").classList.add("hidden");
    document.getElementById("viewfinder").classList.remove("hidden");
    document.getElementById("flipBtn").classList.remove("hidden");
    document.getElementById("shutterBtn").disabled = false;
  } catch {
    document.getElementById("cameraError").classList.remove("hidden");
    document.getElementById("cameraErrorText").textContent = "Camera access needed! Please allow camera permissions.";
    document.getElementById("viewfinder").classList.add("hidden");
    document.getElementById("flipBtn").classList.add("hidden");
  }
}
function stopCamera() { const v = document.getElementById("cameraVideo"); if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop()); streaming = false; }
function switchCamera() { stopCamera(); facingMode = facingMode === "environment" ? "user" : "environment"; startCamera(); }
function takePhoto() {
  if (!streaming || isIdentifying) return;
  const v = document.getElementById("cameraVideo"), c = document.getElementById("cameraCanvas");
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext("2d").drawImage(v, 0, 0);
  const dataUrl = c.toDataURL("image/jpeg", 0.7);
  identifyPlant(dataUrl);
}

// ── Plant Identification ──
async function identifyPlant(imageDataUrl) {
  isIdentifying = true;
  lastPhotoDataUrl = imageDataUrl;
  document.getElementById("shutterBtn").disabled = true;
  document.getElementById("shutterBtn").innerHTML = '<div class="shutter-spinner"></div>';
  document.getElementById("identifyingText").classList.remove("hidden");

  try {
    const base64Data = imageDataUrl.split(",")[1];
    const response = await fetch("/.netlify/functions/identify-plant", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64Data } },
            { type: "text", text: "Identify this plant. Give me your top 3 guesses." }
          ]
        }]
      }),
    });

    const data = await response.json();
    const text = data.content.map(i => i.type === "text" ? i.text : "").filter(Boolean).join("");
    const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());

    if (parsed.options && parsed.options.length > 0) {
      renderOptions(parsed.options, imageDataUrl);
    } else {
      const dateStr = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
      const fullPlant = { ...parsed, image: imageDataUrl, date: dateStr };
      await selectPlant(fullPlant);
    }
    showScreen("result");
  } catch (err) {
    console.error("Identification failed:", err);
    const fallback = {
      name: "Mystery Plant", scientificName: "Unknown", emoji: "🌿", confidence: "low",
      description: "Oops! Something went wrong. Try another photo with better lighting!",
      funFacts: ["Plants produce the oxygen we breathe!", "The tallest tree was over 380 feet tall!", "Sunflowers can turn to follow the sun!"],
      identificationTip: "Try a closer, well-lit photo of the leaves or flowers!",
      image: imageDataUrl,
      date: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
    };
    renderResult(fallback, false);
    showScreen("result");
  } finally {
    isIdentifying = false;
    document.getElementById("shutterBtn").innerHTML = "🌸";
    document.getElementById("shutterBtn").disabled = !streaming;
    document.getElementById("identifyingText").classList.add("hidden");
  }
}

// ── Render Options (pick one of 3) ──
function renderOptions(options, imageDataUrl) {
  let html = `
    <div class="plant-card" style="border:none;box-shadow:none;background:none;padding:0">
      <img src="${imageDataUrl}" alt="Your photo" style="width:100%;height:200px;object-fit:cover;border-radius:14px;margin-bottom:16px" />
    </div>
    <div class="options-title">🤔 Which one is it?</div>
    <div class="options-subtitle">Tap the one that matches your plant!</div>
  `;

  options.forEach((opt, i) => {
    const confClass = opt.confidence === "high" ? "confidence-high" : opt.confidence === "medium" ? "confidence-medium" : "confidence-low";
    const confLabel = opt.confidence === "high" ? "Very likely!" : opt.confidence === "medium" ? "Maybe" : "Not sure";
    html += `
      <div class="option-card" onclick='pickOption(${i})' id="option-${i}">
        <div class="option-header">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="option-number">${i + 1}</div>
            <div>
              <div class="option-name">${opt.emoji} ${opt.name}</div>
              <div class="option-sci">${opt.scientificName}</div>
            </div>
          </div>
          <span class="confidence-badge ${confClass}">${confLabel}</span>
        </div>
        <div class="option-desc">${opt.description}</div>
        ${opt.identificationTip ? `<div class="option-tip">💡 ${opt.identificationTip}</div>` : ""}
      </div>
    `;
  });

  html += `<button class="primary-btn" onclick="showScreen('camera')" style="background:#e0e0e0;color:#616161;box-shadow:none">None of these — retake photo</button>`;

  window._currentOptions = options;
  window._currentImageUrl = imageDataUrl;

  document.getElementById("resultContent").innerHTML = html;
}

async function pickOption(index) {
  const opt = window._currentOptions[index];
  const imageDataUrl = window._currentImageUrl;
  const dateStr = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  const fullPlant = { ...opt, image: imageDataUrl, date: dateStr };
  await selectPlant(fullPlant);
}

async function selectPlant(plant) {
  const alreadyFound = collection.some(p => p.name.toLowerCase() === plant.name.toLowerCase());

  if (!alreadyFound) {
    collection.unshift(plant);
    xp += XP_PER_PLANT;

    // Save plant data (without photo) to localStorage — always works
    saveData();

    // Save photo separately to IndexedDB — large capacity, persistent
    if (plant.image) {
      await savePhoto(plantId(plant), plant.image);
    }

    updateHeader();
  }

  renderResult(plant, !alreadyFound);
}

// ── Render Result ──
function renderResult(plant, isNew) {
  const factsHTML = (plant.funFacts || []).map((f, i) =>
    `<div class="fun-fact"><span class="icon">${["🌟","✨","💡"][i%3]}</span>${f}</div>`
  ).join("");

  const confClass = plant.confidence === "high" ? "confidence-high" : plant.confidence === "medium" ? "confidence-medium" : "confidence-low";

  document.getElementById("resultContent").innerHTML = `
    ${isNew
      ? `<div style="background:linear-gradient(135deg,var(--pink),var(--purple));color:white;font-family:'Fredoka',sans-serif;font-weight:700;font-size:16px;padding:8px 24px;border-radius:20px;box-shadow:0 4px 16px rgba(236,64,122,.6);animation:bounce .6s ease">⭐ NEW DISCOVERY! +${XP_PER_PLANT} XP</div>`
      : `<div style="background:#e0e0e0;color:#616161;font-family:'Fredoka',sans-serif;font-weight:600;font-size:14px;padding:8px 24px;border-radius:20px">Already in your collection!</div>`
    }
    <div class="plant-card">
      ${plant.image ? `<img src="${plant.image}" alt="${plant.name}" />` : ""}
      <div class="plant-name">${plant.emoji} ${plant.name}
        ${plant.confidence ? `<span class="confidence-badge ${confClass}">${plant.confidence === "high" ? "✓ Sure!" : plant.confidence === "medium" ? "~ Maybe" : "? Unsure"}</span>` : ""}
      </div>
      ${plant.scientificName ? `<div class="plant-sci">${plant.scientificName}</div>` : ""}
      <div class="plant-desc">${plant.description}</div>
      ${plant.identificationTip ? `<div class="id-tip"><div class="id-tip-label">🔍 How to confirm:</div>${plant.identificationTip}</div>` : ""}
      ${factsHTML ? `<div class="fun-facts" style="margin-top:12px"><div class="fun-facts-title">🤓 Fun Facts</div>${factsHTML}</div>` : ""}
    </div>
    <button class="primary-btn" onclick="showScreen('camera')">🌸 Find More Plants!</button>
  `;
}

// ── Delete ──
function confirmDelete(index, event) {
  event.stopPropagation();
  pendingDeleteIndex = index;
  const plant = collection[index];
  document.getElementById("deleteModalText").textContent = `Remove "${plant.name}" from your collection?`;
  document.getElementById("deleteModal").classList.remove("hidden");
  document.getElementById("deleteConfirmBtn").onclick = async function() {
    const plant = collection[pendingDeleteIndex];
    await deletePhoto(plantId(plant)); // Remove photo from IndexedDB
    collection.splice(pendingDeleteIndex, 1);
    xp = Math.max(0, xp - XP_PER_PLANT);
    saveData();
    updateHeader();
    closeDeleteModal();
    renderCollection();
  };
}
function closeDeleteModal() {
  document.getElementById("deleteModal").classList.add("hidden");
  pendingDeleteIndex = -1;
}

// ── Render Collection ──
function renderCollection(selectedPlant) {
  const el = document.getElementById("collectionContent");

  if (selectedPlant) {
    const factsHTML = (selectedPlant.funFacts || []).map((f, i) =>
      `<div class="fun-fact"><span class="icon">${["🌟","✨","💡"][i%3]}</span>${f}</div>`
    ).join("");
    el.innerHTML = `
      <button class="back-btn" onclick="renderCollection()">← Back to collection</button>
      <div class="result-wrap">
        <div class="plant-card">
          ${selectedPlant.image ? `<img src="${selectedPlant.image}" alt="${selectedPlant.name}" />` : `<div style="width:100%;height:200px;background:linear-gradient(135deg,var(--bg1),var(--bg2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:64px;margin-bottom:16px">${selectedPlant.emoji}</div>`}
          <div class="plant-name">${selectedPlant.emoji} ${selectedPlant.name}</div>
          ${selectedPlant.scientificName ? `<div class="plant-sci">${selectedPlant.scientificName}</div>` : ""}
          <div class="plant-desc">${selectedPlant.description}</div>
          ${selectedPlant.identificationTip ? `<div class="id-tip"><div class="id-tip-label">🔍 How to confirm:</div>${selectedPlant.identificationTip}</div>` : ""}
          ${factsHTML ? `<div class="fun-facts" style="margin-top:12px"><div class="fun-facts-title">🤓 Fun Facts</div>${factsHTML}</div>` : ""}
        </div>
      </div>`;
    return;
  }

  if (collection.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🌷</div><div class="empty-title">Your garden is empty!</div><div class="empty-sub">Go find some plants to start your collection!</div></div>`;
    return;
  }

  let html = `
    <div class="collection-title">🌺 My Plant Collection</div>
    <div class="collection-count">${collection.length} plant${collection.length !== 1 ? "s" : ""} discovered</div>
    <div class="collection-grid">`;
  collection.forEach((plant, i) => {
    html += `
      <div class="collection-item" onclick="renderCollection(collection[${i}])">
        <button class="delete-btn" onclick="confirmDelete(${i}, event)" title="Remove">✕</button>
        ${plant.image
          ? `<img src="${plant.image}" alt="${plant.name}" />`
          : `<div class="collection-placeholder">${plant.emoji}</div>`}
        <div class="collection-item-info">
          <div class="collection-item-name">${plant.emoji} ${plant.name}</div>
          <div class="collection-item-date">${plant.date}</div>
        </div>
      </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

// ── Profile ──
function renderProfile() {
  const info = getLevel(xp);
  const pct = info.next ? ((xp - info.prev) / (info.next - info.prev)) * 100 : 100;
  const badgesHTML = BADGES.map(b => {
    const earned = collection.length >= b.count;
    return `<div class="badge-item ${earned?"earned":"locked"}"><div class="badge-emoji">${b.emoji}</div><div class="badge-name" style="color:${earned?"var(--text)":"#9e9e9e"}">${b.name}</div><div class="badge-count" style="color:${earned?"var(--text-muted)":"#bdbdbd"}">${b.count} plants</div></div>`;
  }).join("");

  document.getElementById("profileContent").innerHTML = `
    <div class="profile-card">
      <div class="profile-icon">🌳</div>
      <div class="profile-title">${info.title}</div>
      <div class="profile-level">Level ${info.level}</div>
      <div class="profile-stats">
        <div><div class="stat-num">${xp}</div><div class="stat-label">Total XP</div></div>
        <div><div class="stat-num">${collection.length}</div><div class="stat-label">Plants Found</div></div>
      </div>
      ${info.next ? `<div class="progress-section"><div class="progress-label">${info.next - xp} XP to next level</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>` : ""}
    </div>
    <div class="badges-card"><div class="badges-title">🏅 Badges</div><div class="badges-grid">${badgesHTML}</div></div>
    <div class="text-center" style="margin-top:12px" id="resetArea"><button class="reset-btn" onclick="showResetConfirm()">Reset my garden</button></div>`;
}
function showResetConfirm() {
  document.getElementById("resetArea").innerHTML = `<div class="reset-confirm"><div class="reset-text">Are you sure? This will delete all your plants and XP!</div><div class="reset-actions"><button class="btn-danger" onclick="resetGarden()">Yes, reset</button><button class="btn-cancel" onclick="renderProfile()">Cancel</button></div></div>`;
}
async function resetGarden() {
  collection = []; xp = 0;
  saveData();
  await clearAllPhotos();
  updateHeader();
  showScreen("camera");
}

// ── Init ──
async function init() {
  await openPhotoDB();        // Open IndexedDB for photos
  loadData();                 // Load plant data from localStorage
  await loadPhotosIntoCollection(); // Attach photos from IndexedDB
  updateHeader();
  initBackground();
  startCamera();
}
init();
</script>
